<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>라이더 모니터링</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: #00c4ae; color: #fff;
    padding: 12px 16px 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 12px; opacity: 0.9; }
  .countdown-badge {
    background: rgba(255,255,255,0.25); border-radius: 20px;
    padding: 2px 8px; font-weight: 600; font-size: 12px;
  }

  /* Search */
  .search-wrap { padding: 12px 16px 0; }
  .search-input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1.5px solid #ddd; font-size: 15px; outline: none;
    background: #fff; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #00c4ae; }

  /* Summary */
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px; }
  .sum-card {
    background: #fff; border-radius: 12px; padding: 12px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .sum-label { font-size: 11px; color: #888; font-weight: 500; margin-bottom: 4px; }
  .sum-value { font-size: 24px; font-weight: 700; }
  .sum-value.danger { color: #e53e3e; }
  .sum-value.warn { color: #dd6b20; }
  .sum-value.ok { color: #00c4ae; }

  /* List */
  .list { padding: 0 16px 100px; display: flex; flex-direction: column; gap: 10px; }

  /* Rider card */
  .rider-card {
    background: #fff; border-radius: 14px; padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
    border-left: 4px solid transparent;
    -webkit-user-select: none; user-select: none;
  }
  .rider-card:active { transform: scale(0.98); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .rider-card.danger   { border-left-color: #e53e3e; }
  .rider-card.warn     { border-left-color: #dd6b20; }
  .rider-card.ok       { border-left-color: #48bb78; }
  .rider-card.running  { border-left-color: #3b82f6; }

  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .rider-name { font-size: 16px; font-weight: 700; }
  .rider-card.running .rider-name { color: #3b82f6; }
  .status-badge {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
  }
  .status-badge.active { background: #e6f9f7; color: #00a896; }
  .status-badge.inactive { background: #f2f2f2; color: #888; }

  .card-stats { display: flex; gap: 14px; font-size: 13px; color: #555; }
  .stat-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .stat-val { font-weight: 600; font-size: 15px; color: #1a1a1a; }

  .reject-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .reject-label { font-size: 12px; color: #888; }
  .reject-pct { font-size: 18px; font-weight: 800; }
  .reject-pct.danger { color: #e53e3e; }
  .reject-pct.warn   { color: #dd6b20; }
  .reject-pct.ok     { color: #48bb78; }

  /* Empty / Loading */
  .empty {
    text-align: center; padding: 60px 20px; color: #aaa;
    font-size: 15px;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5);
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; width: 100%; border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px; height: 4px; background: #ddd; border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .modal-status { font-size: 13px; color: #888; margin-bottom: 16px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .modal-stat {
    background: #f7f7f7; border-radius: 10px; padding: 12px;
    text-align: center;
  }
  .modal-stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .modal-stat-val { font-size: 20px; font-weight: 700; }
  .modal-reject-row {
    background: #fff5f5; border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-reject-label { font-size: 13px; color: #888; font-weight: 500; }
  .modal-reject-val { font-size: 26px; font-weight: 800; }
  .modal-reject-val.danger { color: #e53e3e; }
  .modal-reject-val.warn   { color: #dd6b20; }
  .modal-reject-val.ok     { color: #48bb78; }

  .btn-row { display: flex; gap: 10px; }
  .btn-copy {
    flex: 1; padding: 15px; background: #f0f2f5; color: #1a1a1a;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-copy:active { background: #dde0e5; }
  .btn-copy.copied { background: #48bb78; color: #fff; }
  .btn-sms {
    flex: 1; padding: 15px; background: #00c4ae; color: #fff;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-sms:active { background: #009e8e; }

  .refresh-btn {
    background: rgba(255,255,255,0.25); border: none; border-radius: 20px;
    color: #fff; font-size: 12px; font-weight: 600; padding: 3px 10px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.4); }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* 위험 알림 배너 */
  .danger-banner {
    display: none; position: fixed; top: 70px; left: 12px; right: 12px; z-index: 400;
    background: #e53e3e; color: #fff; border-radius: 14px;
    padding: 14px 18px; box-shadow: 0 4px 20px rgba(229,62,62,0.5);
    animation: bannerPop 0.3s ease;
  }
  .danger-banner.show { display: block; }
  @keyframes bannerPop {
    from { transform: translateY(-10px); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }
  .danger-banner-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
  .danger-banner-list  { font-size: 14px; line-height: 1.7; }
  .danger-banner-close {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none; color: #fff; font-size: 20px; cursor: pointer;
  }

  /* Peak summary */
  .peak-summary { padding: 0 16px 4px; }
  .peak-title { font-size: 12px; font-weight: 700; color: #555; margin-bottom: 8px; }
  .peak-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .peak-card {
    background: #fff; border-radius: 12px; padding: 10px 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center;
  }
  .peak-label { font-size: 10px; color: #888; margin-bottom: 4px; line-height: 1.3; }
  .peak-val { font-size: 22px; font-weight: 800; color: #1a1a1a; }

  /* Tabs */
  .tabs {
    display: flex; gap: 0; padding: 12px 16px 0;
  }
  .tab-btn {
    flex: 1; padding: 10px 0; font-size: 14px; font-weight: 600;
    border: 1.5px solid #ddd; background: #fff; color: #888;
    cursor: pointer; transition: all 0.15s;
  }
  .tab-btn:first-child { border-radius: 10px 0 0 10px; }
  .tab-btn:last-child  { border-radius: 0 10px 10px 0; border-left: none; }
  .tab-btn:not(:first-child) { border-left: none; }
  .tab-btn.active {
    background: #00c4ae; color: #fff; border-color: #00c4ae;
  }
</style>
</head>
<body>

<div class="header">
  <h1>라이더 모니터링</h1>
  <div class="header-meta">
    <span id="last-update">마지막 업데이트: -</span>
    <span class="countdown-badge" id="countdown">30s</span>
    <button class="refresh-btn" onclick="manualRefresh()">↻ 새로고침</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-all" onclick="setTab('all')">전체</button>
  <button class="tab-btn" id="tab-active" onclick="setTab('active')">운행중</button>
  <button class="tab-btn" id="tab-danger" onclick="setTab('danger')">⚠️ 위험</button>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" id="search" placeholder="라이더 이름 검색..." autocomplete="off">
</div>

<div class="summary">
  <div class="sum-card"><div class="sum-label">전체 라이더</div><div class="sum-value ok" id="s-total">-</div></div>
  <div class="sum-card"><div class="sum-label">운행중</div><div class="sum-value ok" id="s-active">-</div></div>
  <div class="sum-card"><div class="sum-label">위험 (거절률 20%+)</div><div class="sum-value danger" id="s-danger">-</div></div>
  <div class="sum-card"><div class="sum-label">평균 거절률</div><div class="sum-value" id="s-avg">-</div></div>
  <div class="sum-card" style="grid-column:1/-1;"><div class="sum-label">전체 완료건수</div><div class="sum-value ok" id="s-completed">-</div></div>
</div>

<div class="peak-summary">
  <div class="peak-title">시간대별 배달 합계</div>
  <div class="peak-grid">
    <div class="peak-card">
      <div class="peak-label">🌅 아침점심피크</div>
      <div class="peak-val" id="p-morning">-</div>
    </div>
    <div class="peak-card">
      <div class="peak-label">☀️ 오후논피크</div>
      <div class="peak-val" id="p-afternoon">-</div>
    </div>
    <div class="peak-card">
      <div class="peak-label">🌆 저녁피크</div>
      <div class="peak-val" id="p-evening">-</div>
    </div>
    <div class="peak-card">
      <div class="peak-label">🌙 심야논피크</div>
      <div class="peak-val" id="p-midnight">-</div>
    </div>
  </div>
</div>

<div class="list" id="list">
  <div class="empty" id="empty-msg">데이터를 불러오는 중입니다…</div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-status" id="m-status"></div>
    <div class="modal-grid">
      <div class="modal-stat">
        <div class="modal-stat-label">완료</div>
        <div class="modal-stat-val" id="m-completed"></div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">거절</div>
        <div class="modal-stat-val" id="m-rejected"></div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">배차취소</div>
        <div class="modal-stat-val" id="m-dispatch"></div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">라이더취소</div>
        <div class="modal-stat-val" id="m-rider-cancel"></div>
      </div>
    </div>
    <div style="background:#f7f7f7;border-radius:10px;padding:12px;margin-bottom:16px;">
      <div style="font-size:11px;color:#888;font-weight:600;margin-bottom:8px;">시간대별 배달</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="text-align:center;">
          <div style="font-size:10px;color:#888;margin-bottom:2px;">🌅 아침점심피크</div>
          <div style="font-size:18px;font-weight:700;" id="m-morning">-</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:10px;color:#888;margin-bottom:2px;">☀️ 오후논피크</div>
          <div style="font-size:18px;font-weight:700;" id="m-afternoon">-</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:10px;color:#888;margin-bottom:2px;">🌆 저녁피크</div>
          <div style="font-size:18px;font-weight:700;" id="m-evening">-</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:10px;color:#888;margin-bottom:2px;">🌙 심야논피크</div>
          <div style="font-size:18px;font-weight:700;" id="m-midnight">-</div>
        </div>
      </div>
    </div>
    <div class="modal-reject-row">
      <span class="modal-reject-label">거절률</span>
      <span class="modal-reject-val" id="m-rate"></span>
    </div>
    <div class="btn-row">
      <button class="btn-copy" id="btn-copy">📋 문자 복사</button>
      <button class="btn-sms" id="btn-sms">📱 문자 보내기</button>
    </div>
  </div>
</div>

<div class="danger-banner" id="danger-banner">
  <button class="danger-banner-close" onclick="closeDangerBanner()">✕</button>
  <div class="danger-banner-title">⚠️ 거절률 위험 라이더</div>
  <div class="danger-banner-list" id="danger-banner-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  var API = '/api/riders';
  var INTERVAL = 30;

  var allRiders = [];
  var riderDataTs = null;
  var selectedRider = null;
  var countdownVal = INTERVAL;
  var countdownTimer = null;
  var currentTab = 'all';
  var knownDangerSet = null;

  function playAlert() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.18, 0.36].forEach(function(delay) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.5, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.16);
      });
    } catch(e) {}
  }

  function vibrateAlert() {
    if (navigator.vibrate) {
      // 삐삐삐 패턴: 진동-쉬고-진동-쉬고-진동
      navigator.vibrate([300, 120, 300, 120, 300]);
    }
  }

  function showDangerBanner(riders) {
    var banner = document.getElementById('danger-banner');
    var list   = document.getElementById('danger-banner-list');
    list.innerHTML = riders.map(function(r) {
      return '• ' + r.name + '님 &nbsp;<strong>' + r.rejectRate + '%</strong>';
    }).join('<br>');
    banner.classList.add('show');
    // 8초 후 자동 닫힘
    clearTimeout(window._bannerTimer);
    window._bannerTimer = setTimeout(closeDangerBanner, 8000);
  }

  function closeDangerBanner() {
    document.getElementById('danger-banner').classList.remove('show');
  }

  function checkAndNotify(riders) {
    var dangerous = riders.filter(function(r) { return r.rejectRate >= 20; });
    if (knownDangerSet === null) {
      // 첫 로드: 기록만, 알림 없음
      knownDangerSet = new Set(dangerous.map(function(r) { return r.name; }));
      return;
    }
    var newDanger = dangerous.filter(function(r) { return !knownDangerSet.has(r.name); });
    if (newDanger.length > 0) {
      playAlert();
      vibrateAlert();
      newDanger.forEach(function(r) { knownDangerSet.add(r.name); });
      showDangerBanner(newDanger);
    }
    // 거절률 회복 시 Set 제거 → 다시 넘으면 또 알림
    riders.filter(function(r) { return r.rejectRate < 20; })
          .forEach(function(r) { knownDangerSet.delete(r.name); });
  }

  function setTab(tab) {
    currentTab = tab;
    document.getElementById('tab-all').className = 'tab-btn' + (tab === 'all' ? ' active' : '');
    document.getElementById('tab-active').className = 'tab-btn' + (tab === 'active' ? ' active' : '');
    document.getElementById('tab-danger').className = 'tab-btn' + (tab === 'danger' ? ' active' : '');
    render();
  }

  function fetchRiders() {
    fetch(API)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(json) {
        allRiders = (json.data || []).slice().sort(function(a, b) {
          return b.rejectRate - a.rejectRate;
        });
        riderDataTs = json.ts || null;
        checkAndNotify(allRiders);
        updateLastUpdate();
        render();
        resetCountdown();
      })
      .catch(function(e) {
        showToast('\uB370\uC774\uD130 \uB85C\uB4DC \uC2E4\uD328: ' + e.message);
        resetCountdown();
      });
  }

  function updateLastUpdate() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('last-update').textContent =
      '\uB9C8\uC9C0\uB9C9 \uC5C5\uB370\uC774\uD2B8: ' + h + ':' + m + ':' + s;
  }

  function resetCountdown() {
    countdownVal = INTERVAL;
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(function() {
      countdownVal--;
      document.getElementById('countdown').textContent = countdownVal + 's';
      if (countdownVal <= 0) {
        clearInterval(countdownTimer);
        fetchRiders();
      }
    }, 1000);
    document.getElementById('countdown').textContent = countdownVal + 's';
  }

  function rateClass(rate) {
    if (rate >= 20) return 'danger';
    if (rate >= 10) return 'warn';
    return 'ok';
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function render() {
    var q = document.getElementById('search').value.trim().toLowerCase();
    var base = currentTab === 'active'
      ? allRiders.filter(function(r) { return r.status === '\uC6B4\uD589\uC911'; })
      : currentTab === 'danger'
      ? allRiders.filter(function(r) { return r.rejectRate >= 20; })
      : allRiders;
    var riders = q
      ? base.filter(function(r) { return r.name && r.name.toLowerCase().indexOf(q) !== -1; })
      : base;

    var total = allRiders.length;
    var active = allRiders.filter(function(r) { return r.status === '\uC6B4\uD589\uC911'; }).length;
    var danger         = allRiders.filter(function(r) { return r.rejectRate >= 20; }).length;
    var totalCompleted = allRiders.reduce(function(s, r) { return s + (r.completed || 0); }, 0);
    var totalRejected  = allRiders.reduce(function(s, r) { return s + (r.rejected  || 0); }, 0);
    var totalForRate   = totalCompleted + totalRejected;
    // ✅ 올바른 계산: 전체 거절건수 ÷ (전체 완료 + 전체 거절)
    var avgNum = totalForRate > 0 ? (totalRejected / totalForRate * 100) : null;

    document.getElementById('s-total').textContent     = total;
    document.getElementById('s-active').textContent    = active;
    document.getElementById('s-danger').textContent    = danger;
    document.getElementById('s-completed').textContent = totalCompleted;

    // 피크타임 합계
    var sumM = 0, sumA = 0, sumE = 0, sumN = 0;
    allRiders.forEach(function(r) {
      sumM += r.morning || 0;
      sumA += r.afternoon || 0;
      sumE += r.evening || 0;
      sumN += r.midnight || 0;
    });
    document.getElementById('p-morning').textContent = sumM;
    document.getElementById('p-afternoon').textContent = sumA;
    document.getElementById('p-evening').textContent = sumE;
    document.getElementById('p-midnight').textContent = sumN;
    var avgEl = document.getElementById('s-avg');
    if (avgNum !== null) {
      avgEl.textContent = avgNum.toFixed(1) + '%';
      avgEl.className = 'sum-value ' + rateClass(avgNum);
    } else {
      avgEl.textContent = '-';
      avgEl.className = 'sum-value';
    }

    var list = document.getElementById('list');
    var emptyMsg = document.getElementById('empty-msg');

    Array.from(list.querySelectorAll('.rider-card')).forEach(function(el) { el.remove(); });

    if (riders.length === 0) {
      emptyMsg.style.display = 'block';
      emptyMsg.textContent = q
        ? '\uAC80\uC0C9 \uACB0\uACFC\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.'
        : '\uB77C\uC774\uB354 \uB370\uC774\uD130\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.';
      return;
    }
    emptyMsg.style.display = 'none';

    riders.forEach(function(r) {
      var cls = rateClass(r.rejectRate);
      var isActive = r.status === '\uC6B4\uD589\uC911';
      var card = document.createElement('div');
      card.className = 'rider-card ' + (isActive ? 'running' : cls);
      card.innerHTML =
        '<div class="card-top">' +
          '<span class="rider-name">' + esc(r.name) + '</span>' +
          '<span class="status-badge ' + (isActive ? 'active' : 'inactive') + '">' +
            esc(r.status || '\uBBF8\uD655\uC778') +
          '</span>' +
        '</div>' +
        '<div class="card-stats">' +
          '<div class="stat-item"><span class="stat-val">' + r.completed + '</span><span>\uC644\uB8CC</span></div>' +
          '<div class="stat-item"><span class="stat-val">' + r.rejected + '</span><span>\uAC70\uC808</span></div>' +
          '<div class="stat-item"><span class="stat-val">' + r.dispatchCancel + '</span><span>\uBC30\uCC28\uCDE8\uC18C</span></div>' +
        '</div>' +
        '<div class="reject-row">' +
          '<span class="reject-label">\uAC70\uC808\uB960</span>' +
          '<span class="reject-pct ' + cls + '">' + r.rejectRate + '%</span>' +
        '</div>';
      card.addEventListener('click', function() { openModal(r); });
      list.appendChild(card);
    });
  }

  function openModal(r) {
    selectedRider = r;
    var cls = rateClass(r.rejectRate);
    document.getElementById('m-name').textContent = r.name;
    document.getElementById('m-status').textContent = r.status || '\uBBF8\uD655\uC778';
    document.getElementById('m-completed').textContent = r.completed;
    document.getElementById('m-rejected').textContent = r.rejected;
    document.getElementById('m-dispatch').textContent = r.dispatchCancel;
    document.getElementById('m-rider-cancel').textContent = r.riderCancel;
    document.getElementById('m-morning').textContent = r.morning ?? '-';
    document.getElementById('m-afternoon').textContent = r.afternoon ?? '-';
    document.getElementById('m-evening').textContent = r.evening ?? '-';
    document.getElementById('m-midnight').textContent = r.midnight ?? '-';
    var rateEl = document.getElementById('m-rate');
    rateEl.textContent = r.rejectRate + '%';
    rateEl.className = 'modal-reject-val ' + cls;
    var btn = document.getElementById('btn-copy');
    btn.textContent = '\uBB38\uC790 \uBCF5\uC0AC';
    btn.className = 'btn-copy';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    selectedRider = null;
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('btn-copy').addEventListener('click', function() {
    if (!selectedRider) return;
    var r = selectedRider;
    var text =
      r.name + '\uB2D8\n' +
      '\uC644\uB8CC ' + r.completed + '\uAC74 / \uAC70\uC808 ' + r.rejected + '\uAC74 / \uBC30\uCC28\uCDE8\uC18C ' + r.dispatchCancel + '\uAC74\n' +
      '\uAC70\uC808\uB960 ' + r.rejectRate + '%\n' +
      '\uAC70\uC808\uB960 \uAD00\uB9AC \uBD80\uD0C1\uB4DC\uB9BD\uB2C8\uB2E4.';
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btn-copy');
      btn.textContent = '\uBCF5\uC0AC\uB428!';
      btn.className = 'btn-copy copied';
      showToast('\uBB38\uC790\uAC00 \uD074\uB9BD\uBCF4\uB4DC\uC5D0 \uBCF5\uC0AC\uB418\uC5C8\uC2B5\uB2C8\uB2E4.');
    }).catch(function(e) {
      showToast('\uBCF5\uC0AC \uC2E4\uD328: ' + e.message);
    });
  });

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  document.getElementById('btn-sms').addEventListener('click', function() {
    if (!selectedRider) return;
    var r = selectedRider;
    var msg =
      r.name + '\uB2D8\n' +
      '\uC644\uB8CC ' + r.completed + '\uAC74 / \uAC70\uC808 ' + r.rejected + '\uAC74 / \uBC30\uCC28\uCDE8\uC18C ' + r.dispatchCancel + '\uAC74\n' +
      '\uAC70\uC808\uB960 ' + r.rejectRate + '%\n' +
      '\uAC70\uC808\uB960 \uAD00\uB9AC \uBD80\uD0C1\uB4DC\uB9BD\uB2C8\uB2E4.';
    var phone = (r.phone || '').replace(/[^0-9]/g, '');
    if (!phone) {
      showToast('\uC804\uD654\uBC88\uD638\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.');
      return;
    }
    navigator.clipboard.writeText(msg).catch(function(){});
    window.location.href = 'sms:' + phone;
    showToast('\uBB38\uC790\uC571 \uC5F4\uB9BC \u2014 \uBD99\uC5EC\uB123\uAE30\uD558\uC138\uC694');
  });

  var _pollTimer = null;

  function manualRefresh() {
    fetch('/api/request-refresh', { method: 'POST' }).catch(function(){});
    fetchRiders();
    showToast('배민에서 최신 데이터 가져오는 중…');

    if (_pollTimer) clearInterval(_pollTimer);
    var attempts = 0;
    _pollTimer = setInterval(function() {
      attempts++;
      fetch(API)
        .then(function(r) { return r.json(); })
        .then(function(json) {
          if (json.ts && json.ts !== riderDataTs) {
            clearInterval(_pollTimer);
            allRiders = (json.data || []).slice().sort(function(a, b) { return b.rejectRate - a.rejectRate; });
            riderDataTs = json.ts;
            checkAndNotify(allRiders);
            updateLastUpdate();
            render();
            resetCountdown();
            showToast('✅ 최신 데이터로 업데이트됐습니다!');
          }
        }).catch(function(){});
      if (attempts >= 30) clearInterval(_pollTimer);
    }, 3000);
  }

  document.getElementById('search').addEventListener('input', render);

  fetchRiders();
</script>
</body>
</html>
